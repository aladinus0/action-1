name: Run Script

on: push

jobs: 
  ascii-job: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: List Repo Files
        run: ls -ltra

      - name: Running a script
        run: |
          chmod +x ascii-script.sh
          ./ascii-script.sh