name: Generate ASCII Artwork

on: push

jobs: 
    first_job:
        runs-on: ubuntu-latest

        steps:
        - name: Install Cowsay
          run: sudo apt-get install cowsay -y

        - name: Checkout repo
          uses: actions/checkout@v6

        - name: Generate ASCII  Artwork
          run: cowsay -f dog "Awwwww Awwwww" > dog.txt
